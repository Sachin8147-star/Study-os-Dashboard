<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07); --border-bright: rgba(255,255,255,0.15);
    --text: #f0f0f8; --text-muted: #7070a0; --text-dim: #404060;
    --accent: #7c6aff; --accent2: #ff6a9b;
    --radius: 16px; --font-display: 'Syne',sans-serif;
    --font-mono: 'Space Mono',monospace; --font-body: 'DM Sans',sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-body); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.35; }
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border-bright);
    border-radius: var(--radius); padding: 40px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .logo {
    font-family: var(--font-mono); font-size: 22px; font-weight: 700;
    color: var(--accent); text-align: center; margin-bottom: 8px;
    letter-spacing: 0.1em;
  }
  .tagline {
    text-align: center; color: var(--text-muted); font-size: 13px;
    margin-bottom: 32px;
  }
  .form-group { margin-bottom: 16px; }
  label {
    display: block; font-family: var(--font-mono); font-size: 10px;
    color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 6px;
    text-transform: uppercase;
  }
  input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; color: var(--text);
    font-family: var(--font-body); font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); }
  .btn {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: var(--accent); color: white; font-family: var(--font-mono);
    font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn:hover { background: #9d8eff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,106,255,0.4); }
  .error {
    background: rgba(255,74,106,0.1); border: 1px solid rgba(255,74,106,0.3);
    border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ff6a8a;
    margin-bottom: 16px;
  }
  .switch-link {
    text-align: center; margin-top: 20px; font-size: 13px;
    color: var(--text-muted);
  }
  .switch-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .switch-link a:hover { text-decoration: underline; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { color: var(--text-dim); font-size: 11px; font-family: var(--font-mono); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="logo">◈ StudyOS</div>
  <div class="tagline">Your Academic Command Center</div>

  {% if form.errors %}
  <div class="error">Invalid credentials. Please try again.</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>USERNAME</label>
      <input type="text" name="username" placeholder="Enter username" autofocus required>
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn">▶ LOGIN</button>
  </form>

  <div class="switch-link">
    Don't have an account? <a href="/register/">Register here</a>
  </div>
</div>

<script>
const c = document.getElementById('c'), x = c.getContext('2d');
let pts = [];
function resize() { c.width = innerWidth; c.height = innerHeight; }
function init() {
  pts = Array.from({length:50}, () => ({
    x: Math.random()*c.width, y: Math.random()*c.height,
    vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
    r:Math.random()*1.5+.5,
    col:['#7c6aff','#ff6a9b','#6affd4'][Math.floor(Math.random()*3)]
  }));
}
function draw() {
  x.clearRect(0,0,c.width,c.height);
  pts.forEach(p => {
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>c.width)p.vx*=-1;
    if(p.y<0||p.y>c.height)p.vy*=-1;
    x.beginPath(); x.arc(p.x,p.y,p.r,0,Math.PI*2);
    x.fillStyle=p.col; x.globalAlpha=.4; x.fill();
  });
  x.globalAlpha=1;
  requestAnimationFrame(draw);
}
resize(); init(); draw();
window.addEventListener('resize', () => { resize(); init(); });
</script>
</body>
</html>
